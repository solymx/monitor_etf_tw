name: 自動分析 ETF 並部署報告

on:
  push:
    branches: [ main ]
    paths:
      - '981a/**.csv'      # 只有 981a 底下的 CSV 變動時才觸發
      - 'ana981a.py'
  workflow_dispatch:        # 允許手動執行

permissions:
  contents: write           # 必須要有 write 權限才能 commit 回倉庫
  pages: write
  id-token: write

# 確保同時只有一個部署任務在執行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝 Pandas 與 Plotly
        run: pip install pandas plotly

      - name: 執行分析腳本
        run: python ana981a.py

      - name: 驗證檔案是否產生 (Debug)
        run: |
          if [ -f "ana981a.html" ]; then
            echo "✅ ana981a.html 已成功產生！"
            ls -lh ana981a.html
          else
            echo "❌ 錯誤：找不到 index.html"
            exit 1
          fi

      - name: 將 index.html 提交回倉庫
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ana981a.html
          # 如果檔案沒有變動，commit 會失敗，所以加上 || exit 0 確保流程繼續
          git commit -m "自動更新持股分析報告 [skip ci]" || echo "沒有偵測到 index.html 的變動"
          git push

      - name: 設定 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上傳 index.html 成品
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 上傳根目錄

      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
